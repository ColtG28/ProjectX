name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            binary_name: ProjectX
            package_name: ProjectX-linux-x86_64.tar.gz
            artifact_name: projectx-linux-x86_64
          - os: windows-latest
            label: windows-x86_64
            binary_name: ProjectX.exe
            package_name: ProjectX-windows-x86_64.zip
            artifact_name: projectx-windows-x86_64
          - os: macos-latest
            label: macos
            binary_name: ProjectX
            package_name: ProjectX-macos.dmg
            artifact_name: projectx-macos

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "target/release/${{ matrix.binary_name }}" dist/package/
          cp README.md LICENSE dist/package/
          tar -czf "dist/${{ matrix.package_name }}" -C dist/package .
          sha256sum "dist/${{ matrix.package_name }}" > "dist/${{ matrix.package_name }}.sha256"

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_ROOT="dist/ProjectX.app"
          CONTENTS="$APP_ROOT/Contents"
          MACOS_DIR="$CONTENTS/MacOS"
          RESOURCES_DIR="$CONTENTS/Resources"
          ICONSET_DIR="dist/icon.iconset"
          DMG_DIR="dist/dmg"

          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR" "$ICONSET_DIR" "$DMG_DIR"
          cp "target/release/${{ matrix.binary_name }}" "$MACOS_DIR/ProjectX"
          chmod +x "$MACOS_DIR/ProjectX"
          cp README.md LICENSE "$RESOURCES_DIR/"

          python3 scripts/make_px_icon.py "$ICONSET_DIR"
          iconutil -c icns "$ICONSET_DIR" -o "$RESOURCES_DIR/ProjectX.icns"

          cat > "$CONTENTS/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>ProjectX</string>
            <key>CFBundleExecutable</key>
            <string>ProjectX</string>
            <key>CFBundleIconFile</key>
            <string>ProjectX.icns</string>
            <key>CFBundleIdentifier</key>
            <string>com.coltgorman.projectx</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>ProjectX</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_RUN_NUMBER}</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.utilities</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          cp -R "$APP_ROOT" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "ProjectX" -srcfolder "$DMG_DIR" -ov -format UDZO "dist/${{ matrix.package_name }}"
          shasum -a 256 "dist/${{ matrix.package_name }}" > "dist/${{ matrix.package_name }}.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "target/release/${{ matrix.binary_name }}" dist/package/
          Copy-Item README.md, LICENSE dist/package/
          Compress-Archive -Path dist/package/* -DestinationPath "dist/${{ matrix.package_name }}" -Force
          $hash = (Get-FileHash "dist/${{ matrix.package_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/${{ matrix.package_name }}.sha256" -Value "$hash  ${{ matrix.package_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p dist
          find release-artifacts -type f -maxdepth 2 -exec cp {} dist/ \;
          ls -lah dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
