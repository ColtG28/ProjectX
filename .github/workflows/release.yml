name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            binary_name: ProjectX
            package_name: ProjectX-linux.tar.gz
            artifact_name: projectx-linux
          - os: windows-latest
            label: windows
            binary_name: ProjectX.exe
            package_name: ProjectX-windows.zip
            artifact_name: projectx-windows
          - os: macos-latest
            label: macos
            binary_name: ProjectX
            package_name: ProjectX-macos.dmg
            artifact_name: projectx-macos

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          bash scripts/package_linux_release.sh dist

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        env:
          PROJECTX_VERSION: ${{ github.ref_name }}
          PROJECTX_BUILD_NUMBER: ${{ github.run_number }}
          PROJECTX_ADHOC_SIGN: "1"
        run: |
          bash scripts/package_macos_app.sh dist
          mv "dist/ProjectX-macos.dmg" "dist/${{ matrix.package_name }}"
          mv "dist/ProjectX-macos.dmg.sha256" "dist/${{ matrix.package_name }}.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/package_windows_release.ps1 -OutDir dist
          Move-Item -Force "dist/ProjectX-windows.zip" "dist/${{ matrix.package_name }}"
          Move-Item -Force "dist/ProjectX-windows.zip.sha256" "dist/${{ matrix.package_name }}.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.package_name }}
            dist/${{ matrix.package_name }}.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p dist
          find release-artifacts -type f -maxdepth 2 -exec cp {} dist/ \;
          ls -lah dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
